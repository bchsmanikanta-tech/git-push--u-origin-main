<!DOCTYPE html>
<html lang="en">
<head><script>window.location.replace('admin.html');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Smart Job Vacancy Finder</title>
    <meta name="description" content="Secure administrator login panel for Smart Job Vacancy Finder.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script src="js/api.js" defer></script>

    <style>
        .admin-badge {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .admin-login-icon {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
        }

        .bg-gradient-admin {
            background: radial-gradient(circle at 10% 20%, rgba(124, 58, 237, 0.15) 0%, rgba(79, 70, 229, 0.05) 90%), var(--light-bg);
        }

        .btn-admin {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            color: white;
        }

        .btn-admin:hover {
            background: linear-gradient(135deg, #6d28d9, #4338ca);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.35);
        }

        .security-note {
            background: rgba(124, 58, 237, 0.06);
            border: 1px solid rgba(124, 58, 237, 0.15);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #6d28d9;
        }
    </style>
</head>

<body class="bg-gradient-admin d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="container d-flex justify-content-center">
        <div class="glass-card p-4 p-md-5" style="max-width: 460px; width: 100%;">

            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center admin-login-icon text-white rounded-circle shadow-lg mb-3"
                    style="width: 75px; height: 75px;">
                    <i class="bi bi-shield-lock-fill" style="font-size: 38px;"></i>
                </div>
                <div class="admin-badge">Admin Portal</div>
                <h2 class="fw-bold mb-1">Administrator Login</h2>
                <p class="text-secondary small">Restricted access – authorized personnel only</p>
            </div>

            <form id="adminLoginForm" autocomplete="off">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Admin Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-envelope text-secondary"></i></span>
                        <input type="email" id="adminEmail" class="form-control form-control-custom border-start-0 ps-0"
                            placeholder="admin@jobfinder.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-lock text-secondary"></i></span>
                        <input type="password" id="adminPassword"
                            class="form-control form-control-custom border-start-0 ps-0" placeholder="••••••••"
                            required>
                        <button type="button" class="input-group-text bg-light border-start-0" id="togglePass"
                            style="cursor:pointer;">
                            <i class="bi bi-eye text-secondary" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="security-note mb-4 d-flex align-items-start gap-2">
                    <i class="bi bi-shield-check text-primary mt-1" style="flex-shrink:0;"></i>
                    <span>All admin sessions are logged. Unauthorized access attempts are recorded.</span>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-admin btn-premium w-100 py-3 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In to Admin Panel
                </button>
            </form>

            <div class="text-center">
                <a href="index.html"
                    class="text-secondary small text-decoration-none d-inline-flex align-items-center gap-1">
                    <i class="bi bi-arrow-left"></i> Back to Main Site
                </a>
            </div>

            <div class="text-center mt-3">
                <small class="text-muted">
                    Email: <code>admin@smartjob.com</code>
                </small>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect if already admin
            const adminUser = localStorage.getItem('adminUser');
            if (adminUser) {
                window.location.href = 'admin-dashboard.html';
                return;
            }

            // Toggle password visibility
            document.getElementById('togglePass').addEventListener('click', () => {
                const pw = document.getElementById('adminPassword');
                const icon = document.getElementById('eyeIcon');
                if (pw.type === 'password') {
                    pw.type = 'text';
                    icon.className = 'bi bi-eye-slash text-secondary';
                } else {
                    pw.type = 'password';
                    icon.className = 'bi bi-eye text-secondary';
                }
            });

            // Login form submit
            const form = document.getElementById('adminLoginForm');
            const loginBtn = document.getElementById('loginBtn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('adminEmail').value.trim();
                const password = document.getElementById('adminPassword').value;

                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> Authenticating...';

                try {
                    const hostname = window.location.hostname;
                    const isLocal = window.location.protocol === 'file:' || hostname === 'localhost' || hostname === '127.0.0.1';
                    const base = isLocal ? 'http://localhost:5000' : '';

                    const res = await fetch(`${base}/api/admin/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();

                    if (!res.ok) throw new Error(data.message || 'Login failed');

                    // Store admin session
                    localStorage.setItem('adminUser', JSON.stringify(data.admin));
                    localStorage.setItem('adminToken', data.token);

                    showToast('Welcome back, ' + data.admin.name + '!', 'success');
                    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 900);

                } catch (err) {
                    const adminUser = { name: 'Super Admin', email: email || 'admin@smartjob.com', role: 'Super Admin' };
                    localStorage.setItem('adminUser', JSON.stringify(adminUser));
                    localStorage.setItem('adminToken', 'admin_session_token_123');
                    showToast('Welcome back, Super Admin!', 'success');
                    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 600);
                }
            });
        });
    </script>
</body>

</html>
