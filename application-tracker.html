<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Pipeline & Interview Tracker – Smart Job Vacancy Finder</title>
    <meta name="description" content="Kanban board application tracker and interview scheduling calendar for job seekers.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .tracker-hero {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            color: white;
            padding: 40px 0 30px;
            border-radius: 0 0 20px 20px;
        }
        .kanban-col {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            min-height: 500px;
        }
        .kanban-header {
            font-size: 14px;
            font-weight: 700;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .pipeline-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(226,232,240,0.8);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .pipeline-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top bg-white border-bottom shadow-sm py-2">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="index.html">
            <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-briefcase-fill text-white fs-6"></i>
            </div>
            <span>Job<span class="text-primary">Finder</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4 gap-lg-2">
                <li class="nav-item"><a class="nav-link fw-medium" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link fw-medium" href="jobs.html">Find Jobs</a></li>
                <li class="nav-item"><a class="nav-link fw-medium" href="my-applications.html">My Applications</a></li>
                <li class="nav-item"><a class="nav-link fw-medium text-primary active fw-semibold" href="application-tracker.html"><i class="bi bi-kanban-fill me-1"></i>Kanban Tracker</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="tracker-hero text-center">
    <div class="container">
        <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill fw-semibold mb-2">Visual Pipeline Management</span>
        <h2 class="fw-bold mb-2">Application Tracker & Pipeline</h2>
        <p class="text-white-50 small mb-0">Manage your active job applications across recruitment stages.</p>
    </div>
</section>

<!-- Content Body -->
<div class="container-fluid px-4 py-4">
    <!-- Kanban Board Grid -->
    <div class="row g-3">
        <!-- Col 1: Applied -->
        <div class="col-md">
            <div class="kanban-col">
                <div class="kanban-header text-primary">
                    <span><i class="bi bi-send-fill me-1"></i> APPLIED</span>
                    <span class="badge bg-primary rounded-pill" id="cntApplied">0</span>
                </div>
                <div id="colApplied"></div>
            </div>
        </div>

        <!-- Col 2: Shortlisted -->
        <div class="col-md">
            <div class="kanban-col">
                <div class="kanban-header text-info">
                    <span><i class="bi bi-star-fill me-1"></i> SHORTLISTED</span>
                    <span class="badge bg-info rounded-pill" id="cntShortlisted">0</span>
                </div>
                <div id="colShortlisted"></div>
            </div>
        </div>

        <!-- Col 3: Interview Scheduled -->
        <div class="col-md">
            <div class="kanban-col">
                <div class="kanban-header text-warning">
                    <span><i class="bi bi-calendar-event-fill me-1"></i> INTERVIEWS</span>
                    <span class="badge bg-warning rounded-pill text-dark" id="cntInterviews">0</span>
                </div>
                <div id="colInterviews"></div>
            </div>
        </div>

        <!-- Col 4: Offer Received -->
        <div class="col-md">
            <div class="kanban-col">
                <div class="kanban-header text-success">
                    <span><i class="bi bi-trophy-fill me-1"></i> OFFERS</span>
                    <span class="badge bg-success rounded-pill" id="cntOffers">0</span>
                </div>
                <div id="colOffers"></div>
            </div>
        </div>

        <!-- Col 5: Archived -->
        <div class="col-md">
            <div class="kanban-col">
                <div class="kanban-header text-secondary">
                    <span><i class="bi bi-archive-fill me-1"></i> ARCHIVED</span>
                    <span class="badge bg-secondary rounded-pill" id="cntArchived">0</span>
                </div>
                <div id="colArchived"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast-container" style="position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
const user = Session.getUser() || { email: 'joshitha@gmail.com' };

async function loadPipeline() {
    try {
        let res = null;
        try {
            res = await API.seeker.getPipeline(user.email);
        } catch (err) {
            console.warn('API fallback pipeline:', err.message);
        }

        const pipeline = (res && res.pipeline) ? res.pipeline : getFallbackPipeline();
        renderPipeline(pipeline);
    } catch (err) {
        showToast(err.message, 'error');
    }
}

function getFallbackPipeline() {
    return {
        applied: [{ _id: 'a1', jobTitle: 'Full Stack React Engineer', companyName: 'TechCorp Solutions', appliedDate: '2026-07-18' }],
        shortlisted: [{ _id: 'a2', jobTitle: 'Senior Node.js Developer', companyName: 'InnovateX Labs', appliedDate: '2026-07-15' }],
        interviewScheduled: [{ _id: 'a3', jobTitle: 'AI & Data Scientist', companyName: 'Global AI Tech', appliedDate: '2026-07-12', scheduledTime: 'Tomorrow 3:00 PM', meetLink: 'https://meet.google.com/smart-job-demo' }],
        offerReceived: [{ _id: 'a4', jobTitle: 'Frontend UI Engineer', companyName: 'Apex Cloud Systems', appliedDate: '2026-07-05' }],
        archived: []
    };
}

function renderPipeline(p) {
    document.getElementById('cntApplied').textContent = p.applied.length;
    document.getElementById('cntShortlisted').textContent = p.shortlisted.length;
    document.getElementById('cntInterviews').textContent = p.interviewScheduled.length;
    document.getElementById('cntOffers').textContent = p.offerReceived.length;
    document.getElementById('cntArchived').textContent = p.archived.length;

    renderCards('colApplied', p.applied, 'Applied');
    renderCards('colShortlisted', p.shortlisted, 'Shortlisted');
    renderCards('colInterviews', p.interviewScheduled, 'Interview Scheduled');
    renderCards('colOffers', p.offerReceived, 'Offer Received');
    renderCards('colArchived', p.archived, 'Archived');
}

function renderCards(containerId, items, currentStage) {
    const container = document.getElementById(containerId);
    if (!items || !items.length) {
        container.innerHTML = `<div class="text-center py-4 text-muted small">No applications</div>`;
        return;
    }

    container.innerHTML = items.map(item => `
        <div class="pipeline-card">
            <h6 class="fw-bold text-dark mb-1">${item.jobTitle}</h6>
            <div class="text-secondary small mb-2"><i class="bi bi-building me-1"></i>${item.companyName}</div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="text-muted" style="font-size:11px;">Applied: ${item.appliedDate||'Recently'}</span>
            </div>
            ${item.meetLink ? `<a href="${item.meetLink}" target="_blank" class="btn btn-sm btn-outline-primary w-100 mb-2 py-1" style="font-size:11px;"><i class="bi bi-camera-video me-1"></i>Join Meet</a>` : ''}
            <select class="form-select form-select-sm" onchange="moveStage('${item._id}', this.value)">
                <option value="Applied" ${currentStage==='Applied'?'selected':''}>Stage: Applied</option>
                <option value="Shortlisted" ${currentStage==='Shortlisted'?'selected':''}>Stage: Shortlisted</option>
                <option value="Interview Scheduled" ${currentStage==='Interview Scheduled'?'selected':''}>Stage: Interview</option>
                <option value="Offer Received" ${currentStage==='Offer Received'?'selected':''}>Stage: Offer</option>
                <option value="Archived" ${currentStage==='Archived'?'selected':''}>Stage: Archive</option>
            </select>
        </div>
    `).join('');
}

async function moveStage(id, newStage) {
    try {
        await API.seeker.updatePipelineStatus(id, newStage);
        showToast(`Moved application to "${newStage}"`, 'success');
        loadPipeline();
    } catch (err) {
        showToast(err.message, 'error');
    }
}

loadPipeline();
</script>
</body>
</html>
