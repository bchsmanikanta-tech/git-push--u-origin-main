<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>!function(){try{var t=localStorage.getItem("sjvf_theme")||"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - Smart Job Finder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <style>
        .slide-collapse {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, margin-bottom 0.4s ease;
        }
        .slide-collapse.show {
            max-height: 200px;
            opacity: 1;
            margin-bottom: 1rem;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up-element {
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
    
    <script src="js/api.js" defer></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-custom jobseeker-nav">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-send"></i> Job Application
            </span>
            <div>
                <a id="back-btn" href="jobs.html" class="btn btn-outline-primary me-2">
                    <i class="bi bi-arrow-left"></i> Cancel
                </a>
                <button class="btn btn-outline-danger btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="glass-card mx-auto p-4 p-md-5" style="max-width: 650px;">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">Job Application Form</h2>
                <p class="text-secondary small">Provide details below to submit your candidature</p>
                <hr>
            </div>
            
            <div id="loading-spinner" class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-secondary mt-2 small">Preparing form...</p>
            </div>

            <form id="applyForm" class="d-none">
                <div class="mb-3 fade-up-element" style="animation-delay: 0.05s;">
                    <label class="form-label fw-semibold">Job Title</label>
                    <input type="text" id="job-title" class="form-control form-control-custom bg-light" readonly>
                </div>
                
                <div class="row fade-up-element" style="animation-delay: 0.1s;">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" id="full-name" class="form-control form-control-custom" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" id="email" class="form-control form-control-custom bg-light" readonly>
                    </div>
                </div>
                
                <div class="mb-3 fade-up-element" style="animation-delay: 0.15s;">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <input type="tel" id="phone" class="form-control form-control-custom" placeholder="+91 9999988888" required>
                </div>

                <div class="mb-3 fade-up-element" style="animation-delay: 0.2s;">
                    <label class="form-label fw-semibold">Address</label>
                    <input type="text" id="address" class="form-control form-control-custom" placeholder="Flat, House no., Building, Street" required>
                </div>
                
                <div class="row fade-up-element" style="animation-delay: 0.25s;">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">City</label>
                        <input type="text" id="city" class="form-control form-control-custom" placeholder="e.g. Hyderabad" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">State</label>
                        <input type="text" id="state" class="form-control form-control-custom" placeholder="e.g. Telangana" required>
                    </div>
                </div>

                <div class="row fade-up-element" style="animation-delay: 0.3s;">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">CGPA</label>
                        <input type="number" step="0.01" min="0" max="10" id="cgpa" class="form-control form-control-custom" placeholder="e.g., 8.5" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Highest Qualification</label>
                        <select id="qualification" class="form-select form-control-custom" required>
                            <option value="" disabled selected>Select highest degree...</option>
                            <option value="High School">High School</option>
                            <option value="Associate Degree">Associate Degree</option>
                            <option value="Bachelor's Degree">Bachelor's Degree</option>
                            <option value="Master's Degree">Master's Degree</option>
                            <option value="Ph.D.">Ph.D.</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="row fade-up-element" style="animation-delay: 0.32s;">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Years of Experience</label>
                        <input type="number" step="0.1" min="0" id="experience-years" class="form-control form-control-custom" placeholder="e.g., 2.5" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Expected Salary (LPA)</label>
                        <input type="number" step="0.1" min="0" id="expected-salary" class="form-control form-control-custom" placeholder="e.g., 8.5" required>
                    </div>
                </div>

                <div class="row fade-up-element" style="animation-delay: 0.34s;">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">GitHub Profile URL</label>
                        <input type="url" id="github-profile" class="form-control form-control-custom" placeholder="https://github.com/username">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">LinkedIn Profile URL</label>
                        <input type="url" id="linkedin-profile" class="form-control form-control-custom" placeholder="https://linkedin.com/in/username">
                    </div>
                </div>

                <div class="mb-3 fade-up-element" style="animation-delay: 0.36s;">
                    <label class="form-label fw-semibold mb-2 d-block">Do you have a Certification?</label>
                    <div class="d-flex gap-4 align-items-center mt-2 pt-1">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="hasCertification" id="cert-yes" value="yes">
                            <label class="form-check-label text-slate-800" for="cert-yes">Yes</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="hasCertification" id="cert-no" value="no" checked>
                            <label class="form-check-label text-slate-800" for="cert-no">No</label>
                        </div>
                    </div>
                </div>

                <div class="mb-3 slide-collapse fade-up-element" id="certificate-upload-wrapper" style="animation-delay: 0.35s;">
                    <label class="form-label fw-semibold">Upload Certificate</label>
                    <input type="file" id="certificate-file" class="form-control form-control-custom mb-1" accept=".pdf,.jpg,.jpeg,.png">
                    <span class="text-secondary small d-block">
                        Accepted formats: PDF, JPG, JPEG, PNG. Max size: 5MB.
                    </span>
                </div>
                
                <div class="mb-3 fade-up-element" style="animation-delay: 0.4s;">
                    <label class="form-label fw-semibold">Upload Application Resume</label>
                    <input type="file" id="resume-file" class="form-control form-control-custom mb-2">
                    
                    <div class="form-check" id="use-existing-resume-wrapper" style="display: none;">
                        <input class="form-check-input" type="checkbox" id="use-existing-resume" checked>
                        <label class="form-check-label text-secondary small" for="use-existing-resume">
                            Use my uploaded profile resume (<span id="existing-resume-name">resume.pdf</span>)
                        </label>
                    </div>
                    <span class="text-secondary small d-block mt-1" id="resume-help-text">
                        Accepted formats: PDF, DOC, DOCX. Max size: 5MB.
                    </span>
                </div>
                
                <div class="mb-4 fade-up-element" style="animation-delay: 0.45s;">
                    <label class="form-label fw-semibold">Cover Letter</label>
                    <textarea id="cover-letter" class="form-control form-control-custom" rows="5" placeholder="Write briefly why you are a good fit for this role..." required></textarea>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-premium btn-premium-secondary w-100 py-3 fade-up-element" style="animation-delay: 0.5s;">
                    <i class="bi bi-check-circle-fill"></i> Submit Application
                </button>
            </form>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Auth check
            const user = Session.checkAuth('seeker');
            if (!user) return;

            // Get job ID from query parameters
            const urlParams = new URLSearchParams(window.location.search);
            const jobId = urlParams.get('jobId');

            if (!jobId) {
                showToast("Job vacancy parameter is missing", "error");
                setTimeout(() => window.location.href = 'jobs.html', 1500);
                return;
            }

            // Update Back Cancel button to point back to details
            document.getElementById('back-btn').href = `job-details.html?id=${jobId}`;

            let jobDetails = null;
            let seekerProfile = null;

            try {
                // Fetch job and seeker profile in parallel
                const [jobData, profileData] = await Promise.all([
                    API.jobs.get(jobId),
                    API.profile.getSeeker(user.email)
                ]);

                jobDetails = jobData.job;
                seekerProfile = profileData.profile;

                // Bind fields
                document.getElementById('job-title').value = jobDetails.title;
                document.getElementById('full-name').value = seekerProfile.name;
                document.getElementById('email').value = seekerProfile.email;
                if (seekerProfile.cgpa) {
                    document.getElementById('cgpa').value = seekerProfile.cgpa;
                }

                // Pre-fill qualification from profile if available
                if (seekerProfile.qualification) {
                    const qualSelect = document.getElementById('qualification');
                    const options = Array.from(qualSelect.options).map(o => o.value);
                    if (options.includes(seekerProfile.qualification)) {
                        qualSelect.value = seekerProfile.qualification;
                    } else {
                        const lowQual = seekerProfile.qualification.toLowerCase();
                        if (lowQual.includes('bachelor') || lowQual.includes('btech') || lowQual.includes('b.e') || lowQual.includes('degree') || lowQual.includes('graduat')) {
                            qualSelect.value = "Bachelor's Degree";
                        } else if (lowQual.includes('master') || lowQual.includes('mtech') || lowQual.includes('m.e') || lowQual.includes('mba') || lowQual.includes('post grad')) {
                            qualSelect.value = "Master's Degree";
                        } else if (lowQual.includes('phd') || lowQual.includes('doctor')) {
                            qualSelect.value = "Ph.D.";
                        } else if (lowQual.includes('diploma') || lowQual.includes('associate')) {
                            qualSelect.value = "Associate Degree";
                        } else if (lowQual.includes('school') || lowQual.includes('ssc') || lowQual.includes('hsc') || lowQual.includes('inter')) {
                            qualSelect.value = "High School";
                        } else {
                            qualSelect.value = "Other";
                        }
                    }
                }

                // Handle default/uploaded resume checklist
                const useExistingWrapper = document.getElementById('use-existing-resume-wrapper');
                if (seekerProfile.resume) {
                    useExistingWrapper.style.display = 'block';
                    // Show a friendly label instead of raw Base64 data URL
                    const resumeLabel = seekerProfile.resume.startsWith('data:') ? 'Uploaded Resume (on file)' : seekerProfile.resume;
                    document.getElementById('existing-resume-name').innerText = resumeLabel;
                    document.getElementById('resume-file').required = false;
                } else {
                    document.getElementById('resume-file').required = true;
                }

                // Toggle certificate upload wrapper
                const certYes = document.getElementById('cert-yes');
                const certNo = document.getElementById('cert-no');
                const certWrapper = document.getElementById('certificate-upload-wrapper');
                const certFileInput = document.getElementById('certificate-file');

                certYes.addEventListener('change', () => {
                    if (certYes.checked) {
                        certWrapper.classList.add('show');
                        certFileInput.required = true;
                    }
                });

                certNo.addEventListener('change', () => {
                    if (certNo.checked) {
                        certWrapper.classList.remove('show');
                        certFileInput.required = false;
                        certFileInput.value = '';
                    }
                });

                // Hide spinner & show form
                document.getElementById('loading-spinner').classList.add('d-none');
                document.getElementById('applyForm').classList.remove('d-none');

            } catch (err) {
                console.error("Form initialization error:", err);
                document.getElementById('loading-spinner').innerHTML = `
                    <div class="text-danger py-4">
                        <i class="bi bi-exclamation-triangle-fill fs-2"></i>
                        <p class="mt-2">Failed to initialize the form. Please try again later.</p>
                        <a href="jobs.html" class="btn btn-sm btn-primary">Back to Jobs</a>
                    </div>
                `;
            }

            // Form Submit Handler
            const form = document.getElementById('applyForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Submitting...';

                const fullName = document.getElementById('full-name').value.trim();
                const coverLetter = document.getElementById('cover-letter').value.trim();
                const fileInput = document.getElementById('resume-file');
                const checkboxUseExisting = document.getElementById('use-existing-resume');
                const cgpaVal = document.getElementById('cgpa').value.trim();
                const addressVal = document.getElementById('address').value.trim();
                const cityVal = document.getElementById('city').value.trim();
                const stateVal = document.getElementById('state').value.trim();
                const qualVal = document.getElementById('qualification').value;
                const expVal = document.getElementById('experience-years').value.trim();
                const salVal = document.getElementById('expected-salary').value.trim();
                const githubVal = document.getElementById('github-profile').value.trim();
                const linkedinVal = document.getElementById('linkedin-profile').value.trim();

                let finalResumeFilename = seekerProfile.resume || '';
                let certificationUrl = '';

                try {
                    // Check if new resume file was selected
                    if (fileInput.files.length > 0) {
                        showToast("Uploading resume file first...", "info");
                        const uploadRes = await API.profile.uploadResume(user.email, fileInput.files[0]);
                        // Use the Base64 data URL (uploadRes.url), not the original filename
                        finalResumeFilename = uploadRes.url || uploadRes.filename;
                    } else if (seekerProfile.resume && checkboxUseExisting && checkboxUseExisting.checked) {
                        // Use existing resume
                        finalResumeFilename = seekerProfile.resume;
                    } else {
                        // If file was required and not chosen
                        throw new Error("Please upload a resume file.");
                    }

                    // Check if certificate needs to be uploaded
                    if (document.getElementById('cert-yes').checked) {
                        const certFileInput = document.getElementById('certificate-file');
                        if (certFileInput.files.length > 0) {
                            showToast("Uploading certificate file...", "info");
                            const uploadCertRes = await API.profile.uploadCertificate(certFileInput.files[0]);
                            certificationUrl = uploadCertRes.url;
                        } else {
                            throw new Error("Please upload your certification file.");
                        }
                    }

                    // Submit application
                    const appData = {
                        jobId: jobDetails.id,
                        jobTitle: jobDetails.title,
                        companyEmail: jobDetails.companyEmail,
                        companyName: jobDetails.companyName,
                        seekerEmail: user.email,
                        seekerName: fullName,
                        coverLetter: coverLetter,
                        resume: finalResumeFilename,
                        cgpa: cgpaVal,
                        certification: certificationUrl,
                        address: addressVal,
                        city: cityVal,
                        state: stateVal,
                        githubProfile: githubVal,
                        linkedinProfile: linkedinVal,
                        experienceYears: expVal,
                        qualification: qualVal,
                        expectedSalary: salVal
                    };

                    const response = await API.applications.submit(appData);
                    showToast(response.message || "Application submitted successfully!", "success");

                    setTimeout(() => {
                        Session.redirect('my-applications.html');
                    }, 1200);

                } catch (err) {
                    console.error("Application submission failed:", err);
                    showToast(err.message || "Application submission failed.", "error");
                    // Reset submit button state
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Submit Application';
                }
            });
        });
    </script>
</body>
</html>
