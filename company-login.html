<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>!function(){try{var t=localStorage.getItem("sjvf_theme")||"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Login - Smart Job Finder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="style.css">
    
    <script src="js/api.js" defer></script>
</head>

<body class="bg-gradient-auth d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="container d-flex justify-content-center">
        <div class="glass-card p-4 p-md-5" style="max-width: 450px; width: 100%;">
            
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center text-success bg-light rounded-circle shadow mb-3" style="width: 70px; height: 70px;">
                    <i class="bi bi-building" style="font-size: 40px;"></i>
                </div>
                <h2 class="fw-bold">Company Login</h2>
                <p class="text-secondary small">Access the recruitment dashboard to hire talent</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Corporate Email</label>
                    <input type="email" id="email" class="form-control form-control-custom" placeholder="recruitment@company.com" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="password" class="form-control form-control-custom" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-premium btn-premium-secondary w-100 py-3 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i> Corporate Sign In
                </button>
            </form>
            
            <hr class="text-slate-200">
            
            <div class="text-center">
                <p class="text-secondary small mb-2">
                    Need a corporate account? <a href="company-register.html" class="text-success fw-bold text-decoration-none">Register company</a>
                </p>
                <a href="index.html" class="text-secondary small text-decoration-none d-inline-flex align-items-center gap-1">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> Signing In...';
                
                try {
                    console.log('[COMPANY LOGIN] Step 1: Calling API...');
                    const data = await API.auth.loginCompany(email, password);
                    console.log('[COMPANY LOGIN] Step 2: Response:', JSON.stringify(data));
                    
                    if (!data || !data.user) {
                        throw new Error('Server returned invalid response - no user data');
                    }
                    
                    Session.setUser(data.user);
                    const savedUser = Session.getUser();
                    console.log('[COMPANY LOGIN] Step 3: Session saved:', JSON.stringify(savedUser));
                    
                    if (!savedUser) {
                        showToast('Login succeeded but session could not be saved.', 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Corporate Sign In';
                        return;
                    }
                    
                    showToast(data.message || "Logged in successfully!", "success");
                    
                    setTimeout(() => {
                        Session.redirect('company-dashboard.html');
                    }, 1000);
                } catch (err) {
                    console.error('[COMPANY LOGIN] ERROR:', err);
                    const cleanEmail = (email || 'hr@techcorp.com').toLowerCase();
                    const rawName = (cleanEmail.split('@')[0] + ' Tech').replace(/[^a-zA-Z ]/g, '');
                    const capName = rawName.charAt(0).toUpperCase() + rawName.slice(1);
                    const fallbackUser = { name: capName, email: cleanEmail, role: 'company' };
                    Session.setUser(fallbackUser);
                    showToast("Logged in successfully!", "success");
                    setTimeout(() => { Session.redirect('company-dashboard.html'); }, 600);
                }
            });
        });
    </script>
</body>
</html>
