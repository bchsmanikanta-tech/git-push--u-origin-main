<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem("sjvf_theme")||"light";document.documentElement.setAttribute("data-theme",t)}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Jobs - Smart Job Finder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="style.css">
    
    <script src="js/api.js" defer></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom jobseeker-nav">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-briefcase-fill"></i> Smart Job Finder
            </span>
            <div>
                <a href="jobseeker-dashboard.html" class="btn btn-outline-primary me-2">
                    <i class="bi bi-house"></i> Dashboard
                </a>
                <button class="btn btn-outline-danger btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Search Section -->
    <section class="bg-gradient-header text-white py-5 shadow-sm">
        <div class="container">
            <h1 class="text-center fw-bold mb-3">Find Your Dream Job</h1>
            <p class="text-center text-white-50 mb-4 fs-5">Search thousands of active jobs from top-tier companies</p>
            
            <form id="searchForm" class="row g-3 justify-content-center">
                <div class="col-md-5">
                    <div class="input-group shadow-sm rounded">
                        <span class="input-group-text bg-white border-0"><i class="bi bi-search text-secondary"></i></span>
                        <input type="text" id="searchTitle" class="form-control border-0 py-3" placeholder="Job Title, Skills, or Company">
                    </div>
                </div>
                
                <div class="col-md-4">
                    <div class="input-group shadow-sm rounded">
                        <span class="input-group-text bg-white border-0"><i class="bi bi-geo-alt text-secondary"></i></span>
                        <input type="text" id="searchLocation" class="form-control border-0 py-3" placeholder="City or Remote">
                    </div>
                </div>
                
                <div class="col-md-2">
                    <button type="submit" class="btn btn-warning w-100 py-3 fw-bold shadow-sm">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>
            </form>

            <div class="text-center mt-3">
                <button class="btn btn-sm btn-link text-white text-decoration-none" type="button" data-bs-toggle="collapse" data-bs-target="#advancedFilters" aria-expanded="false" aria-controls="advancedFilters">
                    <i class="bi bi-sliders me-1"></i> Advanced Filters <i class="bi bi-chevron-down small"></i>
                </button>
            </div>

            <div class="collapse mt-3" id="advancedFilters">
                <div class="card card-body text-dark border-0 shadow-sm p-4 mx-auto" style="max-width: 900px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border-color);">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold" style="color: var(--text-primary);">Job Type</label>
                            <select id="filterType" class="form-select border-slate-200" style="background-color: var(--bg-input); color: var(--text-primary); border-color: var(--border-color) !important;">
                                <option value="All">All Types</option>
                                <option value="Full Time">Full Time</option>
                                <option value="Part Time">Part Time</option>
                                <option value="Remote">Remote</option>
                                <option value="Hybrid">Hybrid</option>
                                <option value="Internship">Internship</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold" style="color: var(--text-primary);">Experience Level</label>
                            <select id="filterExperience" class="form-select border-slate-200" style="background-color: var(--bg-input); color: var(--text-primary); border-color: var(--border-color) !important;">
                                <option value="All">All Levels</option>
                                <option value="Fresher">Fresher / Entry-Level</option>
                                <option value="1-2 years">1-2 years</option>
                                <option value="3-5 years">3-5 years</option>
                                <option value="5+ years">5+ years</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold" style="color: var(--text-primary);">Min Monthly Salary (INR)</label>
                            <input type="number" id="filterSalary" class="form-control border-slate-200" placeholder="e.g. 25000" style="background-color: var(--bg-input); color: var(--text-primary); border-color: var(--border-color) !important;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Job List -->
    <div class="container py-5">
        <h2 class="fw-bold mb-4" id="results-heading">Latest Job Vacancies</h2>
        
        <div class="row g-4" id="job-cards-container">
            <!-- Dynamic Job Cards will be injected here -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-secondary mt-2">Fetching active vacancies...</p>
            </div>
        </div>
        <!-- Pagination controls -->
        <div class="d-flex justify-content-center mt-5" id="pagination-container"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Auth check
            const user = Session.checkAuth('seeker');
            if (!user) return;

            let currentPage = 1;
            let currentFilters = {};
            let seekerProfile = null;

            async function loadJobs(filters = {}, page = 1) {
                currentPage = page;
                currentFilters = filters;
                
                const container = document.getElementById('job-cards-container');
                const pagContainer = document.getElementById('pagination-container');
                
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="text-secondary mt-2">Searching jobs...</p>
                    </div>
                `;
                pagContainer.innerHTML = '';

                try {
                    // Load profile first to get savedJobs if not loaded
                    if (!seekerProfile) {
                        seekerProfile = await API.profile.getSeeker(user.email);
                    }

                    // Prepare query payload
                    const queryFilters = {
                        ...filters,
                        page: currentPage,
                        limit: 6
                    };

                    const data = await API.jobs.getAll(queryFilters);
                    const jobs = data.jobs;
                    container.innerHTML = '';

                    // Update heading
                    if (filters.title || filters.location || (filters.type && filters.type !== 'All') || (filters.experience && filters.experience !== 'All') || filters.minSalary) {
                        document.getElementById('results-heading').innerText = `Search Results (${data.total})`;
                    } else {
                        document.getElementById('results-heading').innerText = 'Latest Job Vacancies';
                    }

                    if (jobs.length === 0) {
                        container.innerHTML = `
                            <div class="col-12 text-center py-5">
                                <i class="bi bi-emoji-frown fs-1 text-secondary"></i>
                                <h4 class="mt-3 fw-bold text-dark" style="color: var(--text-primary) !important;">No vacancies found</h4>
                                <p class="text-secondary">Try adjusting your search criteria or locations.</p>
                            </div>
                        `;
                        return;
                    }

                    jobs.forEach((job, index) => {
                        let iconClass = 'bi-laptop';
                        const title = job.title.toLowerCase();
                        if (title.includes('java') || title.includes('developer') || title.includes('engineer')) {
                            iconClass = 'bi-code-slash';
                        }
                        if (title.includes('analyst') || title.includes('data')) {
                            iconClass = 'bi-bar-chart-line';
                        }
                        if (title.includes('designer') || title.includes('ux') || title.includes('ui')) {
                            iconClass = 'bi-palette';
                        }

                        let badgeTypeClass = 'bg-primary';
                        if (job.type === 'Remote') badgeTypeClass = 'bg-warning text-dark';
                        if (job.type === 'Hybrid') badgeTypeClass = 'bg-info text-white';
                        if (job.type === 'Part Time') badgeTypeClass = 'bg-secondary';
                        if (job.type === 'Internship') badgeTypeClass = 'bg-dark';

                        const isSaved = (seekerProfile.savedJobs || []).includes(job.id);
                        const bookmarkButton = `
                            <button class="btn btn-sm p-1 rounded-circle bookmark-btn" data-job-id="${job.id}" style="color: ${isSaved ? '#f59e0b' : '#cbd5e1'}; font-size: 20px; border: 0; background: transparent; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">
                                <i class="bi ${isSaved ? 'bi-star-fill' : 'bi-star'}"></i>
                            </button>
                        `;

                        container.innerHTML += `
                            <div class="col-md-6 col-lg-4 fade-up-element" style="animation-delay: ${index * 0.08}s;">
                                <div class="premium-card p-3 h-100 d-flex flex-column justify-content-between">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-start mb-3">
                                            <div class="bg-light p-3 rounded-3 text-primary">
                                                <i class="bi ${iconClass} fs-3"></i>
                                            </div>
                                            <div class="d-flex align-items-center gap-2">
                                                <span class="badge ${badgeTypeClass} px-2.5 py-1.5 rounded-pill small">${job.type}</span>
                                                ${bookmarkButton}
                                            </div>
                                        </div>
                                        <h4 class="fw-bold mb-1" style="color: var(--text-primary);">${job.title}</h4>
                                        <h6 class="text-primary fw-semibold mb-3">${job.companyName}</h6>
                                        
                                        <p class="text-secondary small mb-2" style="color: var(--text-muted) !important;">
                                            <i class="bi bi-geo-alt-fill text-muted"></i> ${job.location}
                                        </p>
                                        <p class="text-secondary small mb-3" style="color: var(--text-muted) !important;">
                                            <i class="bi bi-currency-rupee text-muted"></i> Salary: <b>${job.salary}</b>
                                        </p>
                                    </div>
                                    <a href="job-details.html?id=${job.id}" class="btn btn-premium btn-premium-primary w-100 py-2.5 mt-2">
                                        View Details
                                    </a>
                                </div>
                            </div>
                        `;
                    });

                    // Bind Bookmark Buttons
                    container.querySelectorAll('.bookmark-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            const jobId = btn.dataset.jobId;
                            const isSaved = (seekerProfile.savedJobs || []).includes(jobId);
                            try {
                                if (isSaved) {
                                    await API.savedJobs.remove(user.email, jobId);
                                    seekerProfile.savedJobs = seekerProfile.savedJobs.filter(id => id !== jobId);
                                    btn.style.color = '#cbd5e1';
                                    btn.innerHTML = '<i class="bi bi-star"></i>';
                                    showToast("Bookmark removed!", "info");
                                } else {
                                    await API.savedJobs.add(user.email, jobId);
                                    if (!seekerProfile.savedJobs) seekerProfile.savedJobs = [];
                                    seekerProfile.savedJobs.push(jobId);
                                    btn.style.color = '#f59e0b';
                                    btn.innerHTML = '<i class="bi bi-star-fill"></i>';
                                    showToast("Job bookmarked!", "success");
                                }
                            } catch (bookmarkErr) {
                                console.error("Failed to update bookmark:", bookmarkErr);
                            }
                        });
                    });

                    // Render Pagination
                    if (data.totalPages > 1) {
                        let pagesHtml = `
                            <nav aria-label="Page navigation">
                                <ul class="pagination pagination-custom mb-0 gap-1">
                                    <li class="page-item ${data.page === 1 ? 'disabled' : ''}">
                                        <button class="page-link prev-btn" data-page="${data.page - 1}"><i class="bi bi-chevron-left"></i></button>
                                    </li>
                        `;
                        for (let i = 1; i <= data.totalPages; i++) {
                            pagesHtml += `
                                <li class="page-item ${data.page === i ? 'active' : ''}">
                                    <button class="page-link page-num-btn" data-page="${i}">${i}</button>
                                </li>
                            `;
                        }
                        pagesHtml += `
                                    <li class="page-item ${data.page === data.totalPages ? 'disabled' : ''}">
                                        <button class="page-link next-btn" data-page="${data.page + 1}"><i class="bi bi-chevron-right"></i></button>
                                    </li>
                                </ul>
                            </nav>
                        `;
                        pagContainer.innerHTML = pagesHtml;

                        // Bind Pagination Events
                        pagContainer.querySelectorAll('button.page-link').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const targetPage = parseInt(btn.dataset.page, 10);
                                if (targetPage > 0 && targetPage <= data.totalPages) {
                                    loadJobs(currentFilters, targetPage);
                                    window.scrollTo({ top: 300, behavior: 'smooth' });
                                }
                            });
                        });
                    }

                } catch (err) {
                    console.error("loadJobs failed:", err);
                    container.innerHTML = `
                        <div class="col-12 text-center py-5 text-danger">
                            <i class="bi bi-exclamation-triangle fs-1"></i>
                            <h5 class="mt-3">Failed to load jobs</h5>
                            <p class="small text-secondary">Server may be offline or unreachable.</p>
                        </div>
                    `;
                }
            }

            // Initial load
            loadJobs();

            // Handle search
            const form = document.getElementById('searchForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const title = document.getElementById('searchTitle').value.trim();
                const location = document.getElementById('searchLocation').value.trim();
                const type = document.getElementById('filterType').value;
                const experience = document.getElementById('filterExperience').value;
                const minSalary = document.getElementById('filterSalary').value.trim();
                
                loadJobs({ title, location, type, experience, minSalary });
            });
        });
    </script>
</body>
</html>
