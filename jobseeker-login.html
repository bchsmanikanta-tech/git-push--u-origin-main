<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Login - Smart Job Finder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="style.css">
    
    <script src="js/api.js" defer></script>
</head>

<body class="bg-gradient-auth d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="container d-flex justify-content-center">
        <div class="glass-card p-4 p-md-5" style="max-width: 450px; width: 100%;">
            
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center text-primary bg-light rounded-circle shadow mb-3" style="width: 70px; height: 70px;">
                    <i class="bi bi-person-circle" style="font-size: 40px;"></i>
                </div>
                <h2 class="fw-bold">Job Seeker Login</h2>
                <p class="text-secondary small">Access your account to search and apply for jobs</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email address</label>
                    <input type="email" id="email" class="form-control form-control-custom" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-semibold">Password</label>
                    </div>
                    <input type="password" id="password" class="form-control form-control-custom" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-premium btn-premium-primary w-100 py-3 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>
            
            <hr class="text-slate-200">
            
            <div class="text-center">
                <p class="text-secondary small mb-2">
                    New to Smart Job Finder? <a href="jobseeker-register.html" class="text-primary fw-bold text-decoration-none">Register here</a>
                </p>
                <a href="index.html" class="text-secondary small text-decoration-none d-inline-flex align-items-center gap-1">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                // Show loading state
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> Signing In...';
                
                try {
                    const data = await API.auth.loginSeeker(email, password);
                    Session.setUser(data.user);
                    showToast(data.message || "Logged in successfully!", "success");
                    
                    setTimeout(() => {
                        window.location.href = 'jobseeker-dashboard.html';
                    }, 1000);
                } catch (err) {
                    // Toast error is automatically rendered by apiRequest
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                }
            });
        });
    </script>
</body>
</html>
