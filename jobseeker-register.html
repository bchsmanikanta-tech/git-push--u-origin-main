<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem("sjvf_theme")||"light";document.documentElement.setAttribute("data-theme",t)}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Registration - Smart Job Finder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="style.css">
    
    <script src="js/api.js" defer></script>
</head>

<body class="bg-gradient-auth d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="container d-flex justify-content-center">
        <div class="glass-card p-4 p-md-5" style="max-width: 480px; width: 100%;">
            
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center text-primary bg-light rounded-circle shadow mb-3" style="width: 70px; height: 70px;">
                    <i class="bi bi-person-plus-fill" style="font-size: 40px;"></i>
                </div>
                <h2 class="fw-bold">Job Seeker Register</h2>
                <p class="text-secondary small">Create your candidate profile to find jobs</p>
            </div>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" id="name" class="form-control form-control-custom" placeholder="Rahul Kumar" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email address</label>
                    <input type="email" id="email" class="form-control form-control-custom" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="password" class="form-control form-control-custom" placeholder="Min. 6 characters" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-premium btn-premium-primary w-100 py-3 mb-3">
                    <i class="bi bi-check-circle"></i> Create Account
                </button>
            </form>
            
            <hr class="text-slate-200">
            
            <div class="text-center">
                <p class="text-secondary small mb-2">
                    Already have an account? <a href="jobseeker-login.html" class="text-primary fw-bold text-decoration-none">Login here</a>
                </p>
                <a href="index.html" class="text-secondary small text-decoration-none d-inline-flex align-items-center gap-1">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('registerForm');
            const submitBtn = form.querySelector('button[type="submit"]');

            // Pre-check: ping server to show warning early
            try {
                const resp = await fetch(
                    (window.location.protocol === 'file:' ? 'http://localhost:5000' : '') + '/api/status',
                    { signal: AbortSignal.timeout(3000) }
                );
                if (!resp.ok) throw new Error('Server error');
            } catch {
                showToast('⚠️ Cannot reach the server. Make sure you ran: npm start', 'error');
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                // Show loading state
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> Creating Account...';
                
                try {
                    const data = await API.auth.registerSeeker(name, email, password);
                    showToast(data.message || "Registration successful! Redirecting...", "success");
                    
                    // Auto login and set session
                    Session.setUser({ name, email: email.toLowerCase(), role: 'seeker' });
                    
                    setTimeout(() => {
                        window.location.href = 'jobseeker-dashboard.html';
                    }, 1200);
                } catch (err) {
                    // Toast error is handled inside apiRequest; re-enable button
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Create Account';
                }
            });
        });
    </script>
</body>
</html>
