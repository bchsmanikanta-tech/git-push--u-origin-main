<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>!function(){try{var t=localStorage.getItem("sjvf_theme")||"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Jobs - Smart Job Finder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="style.css">
    
    <script src="js/api.js" defer></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-custom company-nav">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-briefcase"></i> Manage Vacancies
            </span>
            <div>
                <a href="company-dashboard.html" class="btn btn-outline-success me-2">
                    <i class="bi bi-house"></i> Dashboard
                </a>
                <button class="btn btn-outline-danger btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex flex-column align-items-center mb-5">
            <h2 class="fw-bold text-success">Manage Posted Vacancies</h2>
            <p class="text-secondary mb-0">Update information or remove active job listings</p>
        </div>

        <div id="loading-spinner" class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="text-secondary mt-2">Loading posted vacancies...</p>
        </div>

        <div class="row g-4 d-none" id="jobs-list-container">
            <!-- Dynamic jobs cards injected here -->
        </div>

        <div id="no-jobs-container" class="text-center py-5 d-none">
            <i class="bi bi-briefcase-slash fs-1 text-secondary mb-3 d-block"></i>
            <h4 class="fw-bold text-dark">No Job Vacancies Found</h4>
            <p class="text-secondary mb-3">You haven't posted any job openings yet.</p>
            <a href="post-job.html" class="btn btn-premium btn-premium-secondary">
                <i class="bi bi-plus-circle"></i> Post Your First Job
            </a>
        </div>
    </div>

    <!-- Edit Job Modal -->
    <div class="modal fade" id="editJobModal" tabindex="-1" aria-labelledby="editJobModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="border-radius: 16px;">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="editJobModalLabel">Edit Job Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editForm">
                        <input type="hidden" id="edit-job-id">
                        
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Job Title</label>
                                <input type="text" id="edit-title" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Location</label>
                                <input type="text" id="edit-location" class="form-control form-control-custom" required>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Salary Package</label>
                                <input type="text" id="edit-salary" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Job Type</label>
                                <select id="edit-type" class="form-select form-control-custom" required>
                                    <option value="Full Time">Full Time</option>
                                    <option value="Part Time">Part Time</option>
                                    <option value="Internship">Internship</option>
                                    <option value="Remote">Remote</option>
                                    <option value="Hybrid">Hybrid</option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Experience Required</label>
                                <select id="edit-experience" class="form-select form-control-custom" required>
                                    <option value="Fresher">Fresher</option>
                                    <option value="1-2 Years">1-2 Years</option>
                                    <option value="3-5 Years">3-5 Years</option>
                                    <option value="5+ Years">5+ Years</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Vacancy Status</label>
                                <select id="edit-status" class="form-select form-control-custom" required>
                                    <option value="Active">Active</option>
                                    <option value="Closed">Closed</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Required Skills</label>
                            <input type="text" id="edit-skills" class="form-control form-control-custom" placeholder="Example: HTML, CSS, JavaScript (comma separated)">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Job Description</label>
                            <textarea id="edit-description" class="form-control form-control-custom" rows="5" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-premium btn-premium-secondary w-100 py-3">
                            <i class="bi bi-save"></i> Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Auth check
            const user = Session.checkAuth('company');
            if (!user) return;

            let myJobs = [];
            const container = document.getElementById('jobs-list-container');
            const spinner = document.getElementById('loading-spinner');
            const noJobsBox = document.getElementById('no-jobs-container');

            // Load company jobs list
            async function loadJobsList() {
                container.innerHTML = '';
                spinner.classList.remove('d-none');
                container.classList.add('d-none');
                noJobsBox.classList.add('d-none');

                try {
                    const data = await API.jobs.getAll();
                    // Filter specifically for current logged in company
                    myJobs = data.jobs.filter(j => j.companyEmail === user.email);
                    
                    spinner.classList.add('d-none');

                    if (myJobs.length === 0) {
                        noJobsBox.classList.remove('d-none');
                        return;
                    }

                    // Render cards
                    myJobs.forEach(job => {
                        let statusBadgeClass = 'bg-success';
                        if (job.status === 'Closed') statusBadgeClass = 'bg-danger';

                        container.innerHTML += `
                            <div class="col-md-6 col-lg-4" id="job-card-${job.id}">
                                <div class="premium-card p-4 h-100 d-flex flex-column justify-content-between">
                                    <div>
                                        <div class="d-flex justify-content-between align-items-center mb-3">
                                            <span class="badge ${statusBadgeClass} px-2.5 py-1.5 rounded-pill small">${job.status}</span>
                                            <span class="text-secondary small fw-medium">${job.type}</span>
                                        </div>
                                        <h4 class="fw-bold mb-2">${job.title}</h4>
                                        <p class="text-secondary small mb-1">
                                            <i class="bi bi-geo-alt-fill text-muted"></i> ${job.location}
                                        </p>
                                        <p class="text-secondary small mb-3">
                                            <i class="bi bi-currency-rupee text-muted"></i> Salary: <b>${job.salary}</b>
                                        </p>
                                        <p class="text-slate-600 small text-truncate-2 mb-3">
                                            ${job.description}
                                        </p>
                                    </div>
                                    <div class="d-flex gap-2 mt-3 pt-3 border-top border-slate-100">
                                        <button class="btn btn-sm btn-outline-primary flex-grow-1 py-2 fw-semibold" onclick="openEditModal('${job.id}')">
                                            <i class="bi bi-pencil"></i> Edit
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger flex-grow-1 py-2 fw-semibold" onclick="deleteJobVacancy('${job.id}')">
                                            <i class="bi bi-trash"></i> Delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    container.classList.remove('d-none');

                } catch (err) {
                    spinner.innerHTML = `<span class="text-danger small">Failed to load vacancies.</span>`;
                }
            }

            // Load list on boot
            loadJobsList();

            // Make actions global so onclick works
            window.openEditModal = function(jobId) {
                const job = myJobs.find(j => j.id === jobId);
                if (!job) return;

                // Populate modal inputs
                document.getElementById('edit-job-id').value = job.id;
                document.getElementById('edit-title').value = job.title;
                document.getElementById('edit-location').value = job.location;
                document.getElementById('edit-salary').value = job.salary;
                document.getElementById('edit-type').value = job.type;
                document.getElementById('edit-experience').value = job.experience;
                document.getElementById('edit-status').value = job.status;
                document.getElementById('edit-skills').value = job.skills;
                document.getElementById('edit-description').value = job.description;

                // Open Modal
                const editModal = new bootstrap.Modal(document.getElementById('editJobModal'));
                editModal.show();
            };

            // Form Submit for edits
            const editForm = document.getElementById('editForm');
            editForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const jobId = document.getElementById('edit-job-id').value;
                const updateData = {
                    title: document.getElementById('edit-title').value.trim(),
                    location: document.getElementById('edit-location').value.trim(),
                    salary: document.getElementById('edit-salary').value.trim(),
                    type: document.getElementById('edit-type').value,
                    experience: document.getElementById('edit-experience').value,
                    status: document.getElementById('edit-status').value,
                    skills: document.getElementById('edit-skills').value.trim(),
                    description: document.getElementById('edit-description').value.trim()
                };

                try {
                    const res = await API.jobs.update(jobId, updateData);
                    showToast(res.message || "Vacancy updated successfully!", "success");
                    
                    // Close modal
                    const modalEl = document.getElementById('editJobModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    modal.hide();

                    // Refresh list
                    loadJobsList();
                } catch (err) {
                    // Handled inside api.js
                }
            });

            // Delete action
            window.deleteJobVacancy = async function(jobId) {
                if (!confirm("Are you sure you want to delete this job vacancy? This will also remove all candidate applications submitted for this role.")) {
                    return;
                }

                try {
                    const res = await API.jobs.delete(jobId);
                    showToast(res.message || "Vacancy deleted successfully", "success");
                    
                    // Animate out and remove from DOM
                    const card = document.getElementById(`job-card-${jobId}`);
                    if (card) {
                        card.style.transition = 'all 0.3s ease';
                        card.style.transform = 'scale(0.8)';
                        card.style.opacity = '0';
                        setTimeout(() => {
                            loadJobsList(); // Refresh list to catch empty state if it was the last job
                        }, 300);
                    }
                } catch (err) {
                    // Handled inside api.js
                }
            };
        });
    </script>
</body>
</html>
