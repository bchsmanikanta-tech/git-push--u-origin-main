<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem("sjvf_theme")||"light";document.documentElement.setAttribute("data-theme",t)}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications - Smart Job Finder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="style.css">
    
    <script src="js/api.js" defer></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-custom jobseeker-nav">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-file-earmark-text"></i> My Applications
            </span>
            <div>
                <a href="jobseeker-dashboard.html" class="btn btn-outline-primary me-2">
                    <i class="bi bi-house"></i> Dashboard
                </a>
                <button class="btn btn-outline-danger btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex flex-column align-items-center mb-5">
            <h2 class="fw-bold text-primary">Application Track Status</h2>
            <p class="text-secondary mb-0">Check live evaluations and acceptance updates from companies</p>
        </div>

        <div class="premium-card p-4">
            <div id="loading-spinner" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-secondary mt-2">Retrieving applications...</p>
            </div>

            <div id="table-wrapper" class="table-custom-container d-none">
                <table class="table table-custom text-center mb-0">
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Job Role</th>
                            <th>Applied Date</th>
                            <th>Submitted Resume</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="applications-tbody">
                        <!-- Dynamic applications injected here -->
                    </tbody>
                </table>
            </div>
            
            <div id="no-applications" class="text-center py-5 d-none">
                <i class="bi bi-file-earmark-plus-fill fs-1 text-secondary mb-3 d-block"></i>
                <h4 class="fw-bold text-dark">No Applications Yet</h4>
                <p class="text-secondary">You haven't submitted job applications yet.</p>
                <a href="jobs.html" class="btn btn-premium btn-premium-primary mt-2">
                    <i class="bi bi-search"></i> Search Available Jobs
                </a>
            </div>
        </div>
    </div>

    <script>
        // Resume store — maps app ID to Base64 data URL
        const resumeStore = {};

        // Open or download resume safely using central helper
        function openResume(appId) {
            window.viewResume(resumeStore[appId]);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Auth check
            const user = Session.checkAuth('seeker');
            if (!user) return;

            try {
                // Fetch applications
                const data = await API.applications.getForSeeker(user.email);
                const apps = data.applications;

                document.getElementById('loading-spinner').classList.add('d-none');

                if (apps.length === 0) {
                    document.getElementById('no-applications').classList.remove('d-none');
                    return;
                }

                const tbody = document.getElementById('applications-tbody');
                tbody.innerHTML = '';

                // Reverse to show most recent first, build rows via DOM (not innerHTML +=)
                [...apps].reverse().forEach(app => {
                    let badgeClass = 'badge-pending';
                    if (app.status === 'Selected') badgeClass = 'badge-selected';
                    if (app.status === 'Rejected') badgeClass = 'badge-rejected';

                    // Store resume data keyed by app ID
                    if (app.resume) resumeStore[app.id] = app.resume;

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="fw-bold text-slate-800">${app.companyName}</td>
                        <td class="fw-semibold">${app.jobTitle}</td>
                        <td>${app.appliedDate}</td>
                        <td>
                            ${app.resume
                                ? `<button class="btn btn-sm btn-outline-info rounded-pill px-3 view-resume-btn" data-app-id="${app.id}">
                                       <i class="bi bi-file-pdf"></i> View Resume
                                   </button>`
                                : '<span class="text-secondary small">No file</span>'}
                        </td>
                        <td>
                            <span class="badge-custom ${badgeClass}">
                                <i class="bi bi-circle-fill" style="font-size: 8px;"></i> ${app.status}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                // Attach click listeners AFTER rows are in DOM
                document.querySelectorAll('.view-resume-btn').forEach(btn => {
                    btn.addEventListener('click', () => openResume(btn.dataset.appId));
                });

                document.getElementById('table-wrapper').classList.remove('d-none');

            } catch (err) {
                console.error("Failed to load applications:", err);
                document.getElementById('loading-spinner').innerHTML = `
                    <div class="text-danger py-4">
                        <i class="bi bi-exclamation-triangle-fill fs-2"></i>
                        <p class="mt-2">Failed to load applications list.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
