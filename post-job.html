<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>!function(){try{var t=localStorage.getItem("sjvf_theme")||"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job - Smart Job Finder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="style.css">
    
    <script src="js/api.js" defer></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-custom company-nav">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-building"></i> Company Panel
            </span>
            <div>
                <a href="company-dashboard.html" class="btn btn-outline-success me-2">
                    <i class="bi bi-house"></i> Dashboard
                </a>
                <button class="btn btn-outline-danger btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="glass-card mx-auto p-4 p-md-5" style="max-width: 750px;">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold text-success">Post New Job Vacancy</h2>
                <p class="text-secondary small">Provide specific roles and requirements for prospective candidates</p>
                <hr>
            </div>

            <form id="postJobForm">
                <div class="row g-3">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Job Title</label>
                        <input type="text" id="title" class="form-control form-control-custom" placeholder="Example: Frontend Developer" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Company Name</label>
                        <input type="text" id="company-name" class="form-control form-control-custom bg-light" readonly>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Location</label>
                        <input type="text" id="location" class="form-control form-control-custom" placeholder="Example: Hyderabad or Remote" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Salary Package</label>
                        <input type="text" id="salary" class="form-control form-control-custom" placeholder="Example: ₹6 LPA" required>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Job Type</label>
                        <select id="type" class="form-select form-control-custom" required>
                            <option value="">Select Job Type</option>
                            <option value="Full Time">Full Time</option>
                            <option value="Part Time">Part Time</option>
                            <option value="Internship">Internship</option>
                            <option value="Remote">Remote</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Experience Required</label>
                        <select id="experience" class="form-select form-control-custom" required>
                            <option value="Fresher">Fresher (Entry Level)</option>
                            <option value="1-2 Years">1-2 Years</option>
                            <option value="3-5 Years">3-5 Years</option>
                            <option value="5+ Years">5+ Years</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Required Technical Skills</label>
                    <input type="text" id="skills" class="form-control form-control-custom" placeholder="Example: HTML, CSS, JavaScript, React (comma separated)">
                    <span class="text-secondary small">Provide key technical requirements separated by commas.</span>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Job Description & Responsibilities</label>
                    <textarea id="description" class="form-control form-control-custom" rows="6" placeholder="Describe the job profile, responsibilities, requirements and benefits..." required></textarea>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-premium btn-premium-secondary w-100 py-3">
                    <i class="bi bi-plus-circle-fill"></i> Post Vacancy
                </button>
            </form>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Auth check
            const user = Session.checkAuth('company');
            if (!user) return;

            // Set company name automatically
            document.getElementById('company-name').value = user.name;

            const form = document.getElementById('postJobForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Posting...';

                const title = document.getElementById('title').value.trim();
                const location = document.getElementById('location').value.trim();
                const salary = document.getElementById('salary').value.trim();
                const type = document.getElementById('type').value;
                const experience = document.getElementById('experience').value;
                const skills = document.getElementById('skills').value.trim();
                const description = document.getElementById('description').value.trim();

                const jobData = {
                    title,
                    companyEmail: user.email,
                    companyName: user.name,
                    location,
                    salary,
                    type,
                    experience,
                    skills,
                    description
                };

                try {
                    const response = await API.jobs.create(jobData);
                    showToast(response.message || "Vacancy posted successfully!", "success");

                    setTimeout(() => {
                        window.location.href = 'company-dashboard.html';
                    }, 1200);

                } catch (err) {
                    console.error("Job posting failed:", err);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-plus-circle-fill"></i> Post Vacancy';
                }
            });
        });
    </script>
</body>
</html>
